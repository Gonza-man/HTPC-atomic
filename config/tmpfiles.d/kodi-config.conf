# kodi-config.conf — tmpfiles.d rules for Kodi skeleton configuration
#
# The 'C' (copy) directive copies the source to the destination ONLY if the
# destination does not already exist. This makes the setup idempotent:
#   - First boot: skeleton configs are copied → Kodi starts with sane defaults.
#   - After bootc upgrade: existing user-modified configs are preserved.
#
# Source files live in /usr/share/htpc-kodi-config/ (baked into the image).
# Destination is /var/home/kodi/.kodi/userdata/ (writable, survives upgrades).
#
# Syntax: type path mode user group age argument

# Ensure parent directories exist
d /var/home/kodi                    0755 kodi kodi -
d /var/home/kodi/.kodi              0755 kodi kodi -
d /var/home/kodi/.kodi/userdata     0755 kodi kodi -

# Copy skeleton configs (C = copy if destination absent)
C /var/home/kodi/.kodi/userdata/advancedsettings.xml  0644 kodi kodi - /usr/share/htpc-kodi-config/advancedsettings.xml
C /var/home/kodi/.kodi/userdata/sources.xml            0644 kodi kodi - /usr/share/htpc-kodi-config/sources.xml
C /var/home/kodi/.kodi/userdata/favourites.xml         0644 kodi kodi - /usr/share/htpc-kodi-config/favourites.xml
