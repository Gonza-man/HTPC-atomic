---
name: Build HTPC image

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # schedule:
  #   # Daily at 06:00 UTC — runs check-streams even without code changes
  #   - cron: "0 6 * * *"

env:
  REGISTRY: ghcr.io
  OS_IMAGE: ghcr.io/${{ github.repository_owner }}/htpc-image/os
  SIDECAR_IMAGE: ghcr.io/${{ github.repository_owner }}/htpc-image/spotify-sidecar

# ---------------------------------------------------------------------------
# Job 1: build-sidecar
# ---------------------------------------------------------------------------

jobs:
  build-sidecar:
    name: Build spotify-sidecar image
    runs-on: ubuntu-latest
    # Only build on push/PR, not the scheduled stream-check
    if: github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Build sidecar image
        id: build-sidecar
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.SIDECAR_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          context: services/spotify-sidecar
          containerfiles: services/spotify-sidecar/Containerfile
          # Layer caching: reuse layers from the previous push
          extra-args: --layers

      - name: Push sidecar image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-sidecar.outputs.image }}
          tags: ${{ steps.build-sidecar.outputs.tags }}
          registry: "" # already embedded in image name

  # ---------------------------------------------------------------------------
  # Job 2: build-os
  # ---------------------------------------------------------------------------

  build-os:
    name: Build OS image (${{ matrix.gpu }})
    runs-on: ubuntu-latest
    needs: build-sidecar
    # Run even if sidecar was skipped (scheduled runs skip sidecar)
    if: always() && github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        gpu: [amd, intel, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Derive image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          GPU="${{ matrix.gpu }}"
          echo "tags=latest-${GPU} ${SHA}-${GPU}" >> "$GITHUB_OUTPUT"
          # Also tag as ':latest' for the default (amd) variant
          if [[ "$GPU" == "amd" ]]; then
            echo "tags=latest-${GPU} latest ${SHA}-${GPU}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OS image
        id: build-os
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.OS_IMAGE }}
          tags: ${{ steps.tags.outputs.tags }}
          context: .
          containerfiles: Containerfile
          build-args: |
            GPU_VENDOR=${{ matrix.gpu }}
          extra-args: --layers

      - name: Push OS image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-os.outputs.image }}
          tags: ${{ steps.build-os.outputs.tags }}
          registry: ""

  # ---------------------------------------------------------------------------
  # Job 3: check-streams
  # ---------------------------------------------------------------------------

  check-streams:
    name: Check Chilean IPTV streams
    runs-on: ubuntu-latest
    # Run on push, PR, and schedule
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl
        run: sudo apt-get install -y curl

      - name: Run IPTV playlist dry-run
        run: |
          chmod +x config/iptv/update-playlist.sh
          bash config/iptv/update-playlist.sh --dry-run
        # The script exits 1 if zero channels are found, which fails this step.
