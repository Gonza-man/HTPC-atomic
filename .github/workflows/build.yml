---
name: Build HTPC image

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # schedule:
  #   # Daily at 06:00 UTC — runs check-streams even without code changes
  #   - cron: "0 6 * * *"

env:
  REGISTRY: ghcr.io
  # Short image names (no registry prefix) — push-to-registry appends the registry
  SIDECAR_IMAGE: htpc-image/spotify-sidecar
  OS_IMAGE: htpc-image/os

# ---------------------------------------------------------------------------
# Job 1: build-sidecar
# ---------------------------------------------------------------------------

jobs:
  build-sidecar:
    name: Build spotify-sidecar image
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Build sidecar image
        id: build-sidecar
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.SIDECAR_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          context: services/spotify-sidecar
          containerfiles: services/spotify-sidecar/Containerfile
          extra-args: --layers

      - name: Push sidecar image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-sidecar.outputs.image }}
          tags: ${{ steps.build-sidecar.outputs.tags }}
          registry: ${{ env.REGISTRY }}/${{ github.repository_owner }}

  # ---------------------------------------------------------------------------
  # Job 2: build-os
  # ---------------------------------------------------------------------------

  build-os:
    name: Build OS image (${{ matrix.gpu }})
    runs-on: ubuntu-latest
    needs: build-sidecar
    if: always() && github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        gpu: [amd, intel, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Derive image tags
        id: tags
        run: |
          GPU="${{ matrix.gpu }}"
          SHA="${{ github.sha }}"
          # All GPU variants get a gpu-specific tag pair
          TAGS="latest-${GPU} ${SHA}-${GPU}"
          # The amd variant is also the default ':latest'
          if [[ "$GPU" == "amd" ]]; then
            TAGS="${TAGS} latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build OS image
        id: build-os
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.OS_IMAGE }}
          tags: ${{ steps.tags.outputs.tags }}
          context: .
          containerfiles: Containerfile
          build-args: |
            GPU_VENDOR=${{ matrix.gpu }}
          extra-args: --layers

      - name: Push OS image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-os.outputs.image }}
          tags: ${{ steps.build-os.outputs.tags }}
          registry: ${{ env.REGISTRY }}/${{ github.repository_owner }}

  # ---------------------------------------------------------------------------
  # Job 3: check-streams
  # ---------------------------------------------------------------------------

  check-streams:
    name: Check Chilean IPTV streams
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl
        run: sudo apt-get install -y curl

      - name: Run IPTV playlist dry-run
        run: |
          chmod +x config/iptv/update-playlist.sh
          bash config/iptv/update-playlist.sh --dry-run
        # The script exits 1 if zero channels are found, failing the pipeline.
