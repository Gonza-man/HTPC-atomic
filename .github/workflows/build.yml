---
name: Build HTPC image

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # schedule:
  #   # Daily at 06:00 UTC — runs check-streams even without code changes
  #   - cron: "0 6 * * *"

env:
  REGISTRY: ghcr.io
  # Local (short) image names used during the build step.
  # Full push destinations are constructed as ghcr.io/<owner>/<name> in the push steps.
  SIDECAR_IMAGE: htpc-image/spotify-sidecar
  OS_IMAGE: htpc-image/os

# ---------------------------------------------------------------------------
# Job 1: build-sidecar
# ---------------------------------------------------------------------------

jobs:
  build-sidecar:
    name: Build spotify-sidecar image
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Build sidecar image
        id: build-sidecar
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.SIDECAR_IMAGE }}
          tags: |
            latest
            ${{ github.sha }}
          context: services/spotify-sidecar
          containerfiles: services/spotify-sidecar/Containerfile
          extra-args: --layers

      # push-to-registry@v2 cannot handle paths with >2 slashes
      # (ghcr.io/owner/htpc-image/spotify-sidecar is 4 components).
      # Use buildah push with explicit docker:// transport instead.
      - name: Push sidecar image
        run: |
          OWNER="${{ github.repository_owner }}"
          DEST="${{ env.REGISTRY }}/${OWNER,,}/${{ env.SIDECAR_IMAGE }}"
          buildah push "${{ env.SIDECAR_IMAGE }}:latest"            "docker://${DEST}:latest"
          buildah push "${{ env.SIDECAR_IMAGE }}:${{ github.sha }}" "docker://${DEST}:${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Job 2: build-os
  # ---------------------------------------------------------------------------

  build-os:
    name: Build OS image (${{ matrix.gpu }})
    runs-on: ubuntu-latest
    needs: build-sidecar
    if: always() && github.event_name != 'schedule'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        gpu: [amd, intel, nvidia]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | buildah login "${{ env.REGISTRY }}" \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Derive image tags
        id: tags
        run: |
          GPU="${{ matrix.gpu }}"
          SHA="${{ github.sha }}"
          TAGS="latest-${GPU} ${SHA}-${GPU}"
          # amd is the default variant — also tag it as ':latest'
          if [[ "$GPU" == "amd" ]]; then
            TAGS="${TAGS} latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build OS image
        id: build-os
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.OS_IMAGE }}
          tags: ${{ steps.tags.outputs.tags }}
          context: .
          containerfiles: Containerfile
          build-args: |
            GPU_VENDOR=${{ matrix.gpu }}
          extra-args: --layers

      - name: Push OS image
        run: |
          OWNER="${{ github.repository_owner }}"
          DEST="${{ env.REGISTRY }}/${OWNER,,}/${{ env.OS_IMAGE }}"
          for tag in ${{ steps.tags.outputs.tags }}; do
            buildah push "${{ env.OS_IMAGE }}:${tag}" "docker://${DEST}:${tag}"
          done

  # ---------------------------------------------------------------------------
  # Job 3: check-streams
  # ---------------------------------------------------------------------------

  check-streams:
    name: Check Chilean IPTV streams
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl
        run: sudo apt-get install -y curl

      - name: Run IPTV playlist dry-run
        run: |
          chmod +x config/iptv/update-playlist.sh
          bash config/iptv/update-playlist.sh --dry-run
        # The script exits 1 if zero channels are found, failing the pipeline.
